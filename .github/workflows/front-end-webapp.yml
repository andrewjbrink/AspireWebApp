name: Frontend WebApp CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "MudBlazorWebApp/**"
      - ".github/workflows/frontend-webapp.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      APPLICATION_NAME: "app-wowow-web"
      DOTNET_VERSION: "10.0.x"
      PROJECT_PATH: "MudBlazorWebApp/MudBlazorWebApp.csproj" 

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore $PROJECT_PATH

      - name: Build
        run: dotnet build $PROJECT_PATH --configuration Release --no-restore

      -  name: Publish
         run: dotnet publish $PROJECT_PATH \
              --configuration Release \
              --output ./publish \
              --self-contained true \
              --runtime linux-x64 \
              /p:PublishTrimmed=false

      - name: Deploy to Azure Web App (Frontend)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APPLICATION_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND }}
          package: ./publish
